<!DOCTYPE html>
<html>
<head>
    <title>UCEN Digital Notice Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
        }

        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .board {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .notice {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .notice:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .important {
            border: 2px solid #ff4d4d;
            background: rgba(255, 77, 77, 0.2);
        }

        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .tag.important {
            background: #ff4d4d;
            color: white;
        }

        .date {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .empty {
            text-align: center;
            padding: 30px;
            opacity: 0.7;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📢 UCEN Notice Board</h1>

    <div class="board">
        <div class="header-bar">
            <div>Latest Updates</div>
            <div class="badge" id="count"></div>
        </div>

        <div id="notices"></div>
    </div>
</div>

<script>
    let notices = [
        { text: "Mid Semester Exams start from April 15", date: "2026-04-09", important: true },
        { text: "Project submission deadline April 20", date: "2026-04-08", important: false },
        { text: "Workshop on AI this Saturday", date: "2026-04-07", important: false },
        { text: "GOOD DAY", date: "2026-05-26", important: false},
        { text: "BAD DAY", date: "2026-05-26", important: true }
    ];

    let container = document.getElementById("notices");
    let count = document.getElementById("count");

    function renderNotices() {
        container.innerHTML = "";

        if (notices.length === 0) {
            container.innerHTML = "<div class='empty'>No notices available 🚫</div>";
            count.innerText = "0 Notices";
            return;
        }

        count.innerText = notices.length + " Notices";

        notices.forEach(n => {
            let div = document.createElement("div");
            div.className = "notice" + (n.important ? " important" : "");

            let tag = n.important ? "<div class='tag important'>IMPORTANT</div>" : "";

            div.innerHTML = `
                ${tag}
                <div>${n.text}</div>
                <div class='date'>${n.date}</div>
            `;

            container.appendChild(div);
        });
    }

    renderNotices();
</script>

</body>
</html>
